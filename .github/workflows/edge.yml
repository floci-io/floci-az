name: Edge

# Builds and publishes the native image from the tip of main as the `edge` Docker tag.
# Runs on a weekly schedule (every Monday 00:00 UTC) and can be triggered manually.
#
# Published tag: floci/floci-az:edge
#
# Required secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN

on:
  schedule:
    - cron: '0 0 * * 1'   # Every Monday at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push-edge:
    name: Build and push edge image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: graalvm/setup-graalvm@60c26726de13f8b90771df4bc1641a52a3159994 # v1
        with:
          java-version: '25'
          distribution: 'mandrel'
          cache: maven
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build native executable
        run: ./mvnw clean package -Dnative -DskipTests -B

      - name: Make binary executable
        run: chmod +x target/*-runner

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push edge image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.native-package
          push: true
          tags: floci/floci-az:edge
          cache-from: type=gha
          cache-to: type=gha,mode=max
