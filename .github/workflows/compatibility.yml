name: Compatibility Tests

on:
  pull_request:
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.mvn/**'
      - 'mvnw'
      - 'mvnw.cmd'
      - 'Dockerfile'
      - 'Dockerfile.jvm-package'
      - 'docker-compose.yml'
      - 'compatibility-tests/**'
      - '.github/workflows/compatibility.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build floci-az image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build JVM artifact
        run: ./mvnw clean package -DskipTests -q

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.jvm-package
          tags: floci-az:test
          outputs: type=docker,dest=/tmp/floci-az-image.tar
          cache-from: type=gha,scope=floci-az
          cache-to: type=gha,scope=floci-az,mode=max

      - name: Compress image
        run: gzip /tmp/floci-az-image.tar

      - name: Upload floci-az image
        uses: actions/upload-artifact@v4
        with:
          name: floci-az-image
          path: /tmp/floci-az-image.tar.gz
          retention-days: 1

  compat-test:
    name: ${{ matrix.test }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        test:
          - sdk-test-python
          - sdk-test-java
          - sdk-test-node

    steps:
      - name: Download floci-az image
        uses: actions/download-artifact@v4
        with:
          name: floci-az-image
          path: /tmp

      - name: Load floci-az image
        run: gunzip -c /tmp/floci-az-image.tar.gz | docker load

      - name: Create Docker network
        run: docker network create compat-net

      - name: Start floci-az
        run: |
          docker run -d --name floci-az --network compat-net \
            -p 4577:4577 \
            floci-az:test

      - name: Wait for floci-az to be ready
        run: timeout 60 bash -c 'until curl -sf http://localhost:4577/health >/dev/null 2>&1; do sleep 1; done'

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: compatibility-tests

      - uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v7
        with:
          context: compatibility-tests/${{ matrix.test }}
          load: true
          tags: compat-${{ matrix.test }}
          cache-from: type=gha,scope=${{ matrix.test }}
          cache-to: type=gha,scope=${{ matrix.test }},mode=max

      - name: Run tests
        id: tests
        run: |
          mkdir -p test-results
          docker run --rm --network compat-net \
            -e FLOCI_AZ_ENDPOINT=http://floci-az:4577 \
            -v "$(pwd)/test-results:/results" \
            compat-${{ matrix.test }}

      - name: Generate test summary
        if: always() && steps.tests.outcome != 'skipped'
        uses: test-summary/action@v2
        with:
          paths: test-results/*.xml

      - name: Dump floci-az logs
        if: failure()
        run: docker logs floci-az
